name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    env:
      MARKET_DATA_BACKEND: parquet
      CLICKHOUSE_ENABLED: "false"
      DATABASE_URL: sqlite+aiosqlite:///./ci-gaoshou.db
      PARQUET_DATA_DIR: ./data/parquet-ci
      DUCKDB_PATH: ":memory:"
      ENABLE_SYNC_SCHEDULER: "false"
      DEBUG: "false"
      GRID_TRADING_ENABLE_ORDER_SUBMIT: "false"
      PIP_INDEX_URL: https://pypi.org/simple
      PIP_DEFAULT_TIMEOUT: "60"
      PIP_RETRIES: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        continue-on-error: true
        run: python -m ruff check app tests

      - name: Pytest
        run: python -m pytest tests -q

  frontend:
    name: Frontend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
